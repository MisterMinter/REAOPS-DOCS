name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Create test page
        run: |
          mkdir -p build
          echo "<html><body><h1>REAOPS Docs Test</h1></body></html>" > build/index.html
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./build
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
