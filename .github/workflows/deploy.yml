name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Clean
        run: |
          rm -rf node_modules package-lock.json .docusaurus
      - name: Install
        run: npm install
      - name: Build
        run: |
          echo "=== Node version ==="
          node -v
          echo "=== NPM version ==="
          npm -v
          echo "=== Docusaurus version ==="
          npx docusaurus --version
          echo "=== Starting build ==="
          npm run build 2>&1
          echo "=== Exit code: $? ==="
      - name: Upload artifact
        if: success()
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./build
      - name: Deploy
        if: success()
        id: deployment
        uses: actions/deploy-pages@v4
