name: Test Build

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install
        run: |
          echo "=== Node version ==="
          node -v
          npm install 2>&1
        env:
          DEBUG: "*"
      - name: Build
        run: |
          echo "=== Building ==="
          npm run build 2>&1
