name: Test Build

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install
        run: npm install 2>&1
      - name: Build
        run: |
          echo "=== Starting build ==="
          npx docusaurus build 2>&1 | head -100
          echo "=== Build done ==="
